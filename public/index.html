<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)"  content="#000000" />
    <style>
      body, #root { background: #ffffff; }
      @media (prefers-color-scheme: dark) { body, #root { background: #09090b; } }
    </style>
    <script>
      (function () {
        try {
          var mode = localStorage.getItem('pokebattle-theme-mode');
          var dark =
            mode === 'dark' ? true :
            mode === 'light' ? false :
            window.matchMedia('(prefers-color-scheme: dark)').matches;
          var bg = dark ? '#09090b' : '#ffffff';
          document.documentElement.style.background = bg;
          document.body.style.background = bg;
        } catch (e) {}
      })();
    </script>
    <meta name="description" content="PokéScores - Enregistre tes combats Pokémon" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PokéScores" />

    <!-- Preload images fréquentes pour éviter les sauts au premier rendu -->
    <link rel="preload" href="%PUBLIC_URL%/pokeball-open.png" as="image" />
    <link rel="preload" href="%PUBLIC_URL%/pokemon-faces.png" as="image" />
    <link rel="preload" href="%PUBLIC_URL%/avatars/lilie.png" as="image" />
    <link rel="preload" href="%PUBLIC_URL%/avatars/cynthia.png" as="image" />
    <link rel="preload" href="%PUBLIC_URL%/avatars/erika.png" as="image" />
    <link rel="preload" href="%PUBLIC_URL%/avatars/professeur_chen.png" as="image" />
    <link rel="preload" href="%PUBLIC_URL%/avatars/pepper.png" as="image" />
    <link rel="preload" href="%PUBLIC_URL%/avatars/gladio.png" as="image" />
    <link rel="preload" href="%PUBLIC_URL%/avatars/serena.png" as="image" />
    <link rel="preload" href="%PUBLIC_URL%/avatars/giovanni.png" as="image" />
    <link rel="preload" href="%PUBLIC_URL%/avatars/mashynn.png" as="image" />
    <link rel="preload" href="%PUBLIC_URL%/avatars/red.jpg" as="image" />

    <!-- Favicon (navigateur, onglet) -->
    <link rel="icon" type="image/png" href="%PUBLIC_URL%/app-icon.png" />
    <link rel="shortcut icon" href="%PUBLIC_URL%/app-icon.png" />

    <!-- iOS : icône quand "Ajouter à l'écran d'accueil" -->
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/app-icon.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="%PUBLIC_URL%/app-icon.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="%PUBLIC_URL%/app-icon.png" />

    <!-- Manifest PWA -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Tailwind + Font Awesome chargés tôt pour que les classes soient dispo dès React -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        z-index: 9999;
        transition: opacity 0.2s ease;
      }
      @media (prefers-color-scheme: dark) {
        #splash { background: #09090b; }
      }
      #splash.splash-dark { background: #09090b; }
      #splash.splash-light { background: #ffffff; }
      .splash-spinner {
        width: 2rem;
        height: 2rem;
        border: 2px solid #a855f7;
        border-top-color: transparent;
        border-radius: 9999px;
        animation: splash-spin 0.7s linear infinite;
      }
      @keyframes splash-spin {
        to { transform: rotate(360deg); }
      }
    </style>

    <title>PokéScores</title>
  </head>
  <body>
    <noscript>Tu as besoin d'activer JavaScript pour utiliser cette app.</noscript>
    <div id="splash"><div class="splash-spinner"></div></div>
    <div id="root"></div>
    <script>
      // Applique la bonne couleur de fond au splash selon le thème sauvegardé
      (function () {
        try {
          var mode = localStorage.getItem('pokebattle-theme-mode');
          var dark = mode === 'dark' ? true : mode === 'light' ? false : window.matchMedia('(prefers-color-scheme: dark)').matches;
          var splash = document.getElementById('splash');
          if (splash) splash.className = dark ? 'splash-dark' : 'splash-light';
        } catch (e) {}
      })();
    </script>
  </body>
</html>
